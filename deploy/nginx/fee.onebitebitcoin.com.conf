# fee.onebitebitcoin.com — 환율 수수료 앱(fee-app, 127.0.0.1:18080) 인그레스
#
# 이 파일은 "호스트 시스템 nginx"(/etc/nginx)용입니다. (이 레포에는 더 이상 docker nginx 가 없습니다)
# nav.onebitebitcoin.com 설정을 fee 로 이전한 것이며, 인증서는 *.onebitebitcoin.com 와일드카드를 재사용합니다.
#
# 설치:
#   sudo cp deploy/nginx/fee.onebitebitcoin.com.conf /etc/nginx/sites-available/fee.onebitebitcoin.com
#   sudo ln -sf /etc/nginx/sites-available/fee.onebitebitcoin.com /etc/nginx/sites-enabled/fee.onebitebitcoin.com
#   sudo rm -f /etc/nginx/sites-enabled/nav.onebitebitcoin.com   # 죽은 nav 도메인 비활성화
#   sudo nginx -t && sudo nginx -s reload

upstream fee_app {
    server 127.0.0.1:18080;
    keepalive 32;
}

server {
    server_name fee.onebitebitcoin.com;

    client_max_body_size 10M;

    location / {
        proxy_pass http://fee_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 앱 재시작 중 재시도 (무중단 배포)
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 10;
        proxy_next_upstream_timeout 30s;
        proxy_connect_timeout 3s;
        proxy_read_timeout 300s;
    }

    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/onebitebitcoin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onebitebitcoin.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name fee.onebitebitcoin.com;
    return 301 https://$host$request_uri;
}
