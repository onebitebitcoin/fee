<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0976A"/>
      <stop offset="100%" stop-color="#D4693A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7.5" fill="url(#bg)"/>

  <!-- Route path: straight down → rounded corner → straight right -->
  <path d="M 9.5 8 L 9.5 19.5 Q 9.5 24 14 24 L 23 24"
        stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Start dot (departure) -->
  <circle cx="9.5" cy="8" r="3" fill="white"/>

  <!-- End destination: ring + inner dot -->
  <circle cx="23" cy="24" r="4" stroke="white" stroke-width="2.5" fill="none"/>
  <circle cx="23" cy="24" r="1.6" fill="white"/>
</svg>
