<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0976A"/>
      <stop offset="100%" stop-color="#C85A28"/>
    </linearGradient>
  </defs>

  <!-- Full amber background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo icon (centered upper half) -->
  <g transform="translate(520, 160)">
    <rect width="160" height="160" rx="36" fill="rgba(255,255,255,0.18)"/>
    <!-- Route path -->
    <path d="M 40 35 L 40 95 Q 40 120 65 120 L 118 120"
          stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Start dot -->
    <circle cx="40" cy="35" r="11" fill="white"/>
    <!-- End ring + dot -->
    <circle cx="118" cy="120" r="17" stroke="white" stroke-width="10" fill="none"/>
    <circle cx="118" cy="120" r="6" fill="white"/>
  </g>

  <!-- Service name -->
  <text x="600" y="415"
        font-size="72" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1.5">
    수수료는 얼마 들까
  </text>

  <!-- Subtle tagline -->
  <text x="600" y="480"
        font-size="26" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-weight="400" fill="rgba(255,255,255,0.65)" text-anchor="middle" letter-spacing="0.5">
    한국 거래소 → 개인 지갑 최저 수수료 경로
  </text>
</svg>
