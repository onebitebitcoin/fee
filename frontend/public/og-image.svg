<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2EBE0"/>
      <stop offset="100%" stop-color="#E6DDD0"/>
    </linearGradient>
    <linearGradient id="logo-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0976A"/>
      <stop offset="100%" stop-color="#D4693A"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8855A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E8855A" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle warm circle decoration top-right -->
  <circle cx="1050" cy="80" r="280" fill="#E8855A" fill-opacity="0.06"/>
  <circle cx="150" cy="550" r="180" fill="#E8855A" fill-opacity="0.05"/>

  <!-- Logo icon (centered, top half) -->
  <g transform="translate(480, 140)">
    <rect width="120" height="120" rx="28" fill="url(#logo-bg)"/>
    <!-- B stem -->
    <rect x="35.5" y="24" width="10" height="72" rx="5" fill="white"/>
    <!-- Top serif -->
    <rect x="28" y="28" width="7.5" height="6.5" rx="3.25" fill="white"/>
    <!-- Bottom serif -->
    <rect x="28" y="86" width="7.5" height="6.5" rx="3.25" fill="white"/>
    <!-- Upper bump -->
    <path d="M45.5 24 H63 C76 24 82 30.5 82 38.5 C82 46.5 76 53 63 53 H45.5 Z" fill="white"/>
    <!-- Lower bump -->
    <path d="M45.5 53 H64.5 C79.5 53 85.5 60.5 85.5 69 C85.5 77.5 79.5 84.5 64.5 84.5 H45.5 Z" fill="white"/>
  </g>

  <!-- Tag label -->
  <rect x="482" y="290" width="236" height="30" rx="15" fill="url(#pill)"/>
  <text x="600" y="311" font-size="13" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-weight="500" fill="#E8855A" text-anchor="middle" letter-spacing="0.8">BTC ROUTE FINDER</text>

  <!-- App name (Korean) -->
  <text x="600" y="385" font-size="54" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" fill="#1A0A02" text-anchor="middle" letter-spacing="-1">수수료는 얼마 들까</text>

  <!-- Tagline -->
  <text x="600" y="435" font-size="22" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-weight="400" fill="rgba(26,10,2,0.55)" text-anchor="middle" letter-spacing="0.2">한국 거래소 → 개인 지갑  최저 수수료 경로 탐색</text>

  <!-- Divider line -->
  <rect x="520" y="470" width="160" height="1.5" rx="1" fill="#E8855A" fill-opacity="0.35"/>

  <!-- URL -->
  <text x="600" y="505" font-size="16" font-family="'SF Mono', 'JetBrains Mono', 'Courier New', monospace"
        font-weight="400" fill="rgba(26,10,2,0.38)" text-anchor="middle" letter-spacing="0.5">bitcoin route · korea</text>
</svg>
