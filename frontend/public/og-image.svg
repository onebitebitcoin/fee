<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0976A"/>
      <stop offset="100%" stop-color="#C85A28"/>
    </linearGradient>
  </defs>

  <!-- Full amber background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Service name (centered) -->
  <text x="600" y="315"
        font-size="96" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" fill="white" text-anchor="middle" dominant-baseline="middle" letter-spacing="-2">
    수수료는 얼마나 들까?
  </text>
