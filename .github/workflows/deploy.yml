name: "Deploy to Server"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "research/**"
      - "design/**"

jobs:
  deploy:
    runs-on: [self-hosted, fee]
    timeout-minutes: 30
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: "Deploy"
        id: deploy
        run: bash /home/measly/fee/scripts/deploy.sh

      - name: "텔레그램 - 배포 성공"
        if: success() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        run: |
          COMMIT_HASH="${{ github.sha }}"
          SHORT_HASH="${COMMIT_HASH:0:7}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          VERSION=$(cat /home/measly/fee/VERSION 2>/dev/null || echo "unknown")
          MESSAGE="✅ fee 배포 완료%0A%0A📦 v${VERSION}%0A🔖 ${SHORT_HASH}%0A📝 ${COMMIT_MSG}%0A🌐 https://nav.onebitebitcoin.com"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML" > /dev/null

      - name: "텔레그램 - 배포 실패"
        if: failure() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        run: |
          COMMIT_HASH="${{ github.sha }}"
          SHORT_HASH="${COMMIT_HASH:0:7}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          MESSAGE="❌ fee 배포 실패%0A%0A🔖 ${SHORT_HASH}%0A📝 ${COMMIT_MSG}%0A🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML" > /dev/null
