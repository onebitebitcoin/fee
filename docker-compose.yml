services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: exchange_fee
      POSTGRES_USER: exchange_fee
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exchange_fee"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://exchange_fee:${POSTGRES_PASSWORD}@db:5432/exchange_fee
      ENVIRONMENT: production
      PORT: 8000
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      CRAWL_INTERVAL_MINUTES: ${CRAWL_INTERVAL_MINUTES:-60}
      MANUAL_CRAWL_ENABLED: ${MANUAL_CRAWL_ENABLED:-true}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
    ports:
      - "${APP_PORT:-8000}:8000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
